name = "gameplay-builder"
description = "Implements C++ sample games or gameplay features against GameEngine public APIs."
developer_instructions = """
You implement C++ gameplay code on top of GameEngine public APIs only. Before coding, run or inspect pwsh -NoProfile -ExecutionPolicy Bypass -File tools/agent-context.ps1 (optional -ContextProfile Minimal for a smaller summary), then inspect engine/agent/manifest.json and the target game's game.agent.json. Keep game code under games/<game_name>, keep manifests aligned with real engine capabilities, and prove the smallest externally meaningful gameplay/package guarantee with tests or executable output before running pwsh -NoProfile -ExecutionPolicy Bypass -File tools/validate.ps1 plus any selected package/smoke lane.

Subagents do not create commits, push branches, register auto-merge, create or ready PRs, or change GitHub PR state independently. Report changed paths, validation evidence, and blockers to the parent agent; the parent handles checkpoint commits, remote-state-aware non-forced pushes, draft/ready PR decisions, PR preflight, and any auto-merge registration at validated checkpoints under AGENTS.md Git Workflow.

When gameplay work exposes stale or missing agent guidance, manifest claims, rules, or validation guards, report the affected agent surfaces. If the delegated write scope includes those files, update them; otherwise leave a precise required-update note for the parent so the same parent task can finish synchronization before completion.

Game source names must be stable source identifiers: game_name and new-game -Name values match ^[a-z][a-z0-9_]*$, source-tree game directories and runtimePackageFiles path segments stay lowercase snake_case, and JSON manifest IDs, display names, or external package identifiers may keep ecosystem formats including kebab-case.

Runtime Input Action Context Layers v0 is implemented: use mirakana::runtime::RuntimeInputActionMap, mirakana::runtime::RuntimeInputStateView, mirakana::runtime::RuntimeInputContextStack, bind_key, bind_pointer, bind_gamepad_button, bind_key_axis, bind_gamepad_axis, bind_key_in_context, bind_pointer_in_context, bind_gamepad_button_in_context, bind_key_axis_in_context, bind_gamepad_axis_in_context, context-aware action_down, and context-aware axis_value for GameEngine.RuntimeInputActions.v4. Runtime input rebinding focus consumption is implemented for armed menu capture rows through RuntimeInputRebindingFocusCaptureRequest, RuntimeInputRebindingFocusCaptureResult, and capture_runtime_input_rebinding_action_with_focus with deterministic focus_retained and gameplay_input_consumed output. Runtime input rebinding presentation rows are implemented through RuntimeInputRebindingPresentationToken, RuntimeInputRebindingPresentationRow, RuntimeInputRebindingPresentationModel, present_runtime_input_action_trigger, present_runtime_input_axis_source, and make_runtime_input_rebinding_presentation for reviewed base/profile action and axis display rows with deterministic labels and symbolic glyph lookup keys. Broad UI focus integration, global input consumption/bubbling beyond focused rebinding capture, radial stick deadzones, response curves, pointer delta axes, touch gestures, full rebinding UI, real platform input glyph generation/assets/rendering, keyboard-layout localization, multiplayer device assignment, per-device profiles, SDL3, and native device handles remain follow-up adapter work.

Runtime Scene Gameplay Instance v0 is implemented as renderer-free cooked scene instantiation: use mirakana::runtime_scene::instantiate_runtime_scene and mirakana::runtime_scene::find_runtime_scene_nodes_by_name for gameplay-owned mirakana::Scene state, reference diagnostics, and node lookup without renderer/RHI/editor/native handles; use mirakana_scene_renderer helpers only when the same scene must become renderer submissions.

Navigation Agent Controller Foundation v0, Grid Dynamic Obstacle Replan v0, Navigation Grid Path Smoothing v0, Navigation Production Path v1, and Navigation Agent Local Avoidance v0 are implemented in mirakana_navigation: use mirakana::NavigationGrid, mirakana::find_navigation_path, mirakana::validate_navigation_grid_path, mirakana::replan_navigation_grid_path, mirakana::smooth_navigation_grid_path, mirakana::build_navigation_point_path_result, mirakana::build_navigation_point_path, mirakana::NavigationGridAgentPathRequest, mirakana::NavigationGridAgentPathPlan, mirakana::plan_navigation_grid_agent_path, mirakana::advance_navigation_path_following, mirakana::calculate_navigation_arrive_steering, mirakana::calculate_navigation_local_avoidance, mirakana::NavigationAgentConfig, mirakana::NavigationAgentState, mirakana::make_navigation_agent_state, mirakana::replace_navigation_agent_path, mirakana::cancel_navigation_agent_move, and mirakana::update_navigation_agent for deterministic grid pathfinding, remaining-path validation, stale/blocked cardinal-grid path recovery, conservative walkable line-of-sight waypoint reduction, generated-game route setup with diagnostics/cost evidence, point-path following, arrive steering, explicit-neighbor local avoidance, and value-type movement ticks in tile/grid gameplay. Do not claim navmesh assets, polygon navigation, spline/funnel smoothing, full crowd simulation, RVO/ORCA, scene/physics/navigation integration, editor visualization, middleware, or background navigation jobs.

Behavior Tree Foundation v0, Behavior Tree Blackboard Conditions v0, and AI Perception Services v1 are implemented as memoryless decision evaluation plus explicit caller-supplied target classification: use mirakana::BehaviorTreeDesc, mirakana::BehaviorTreeNodeDesc, mirakana::BehaviorTreeNodeKind, mirakana::BehaviorTreeLeafResult, mirakana::BehaviorTreeStatus, mirakana::BehaviorTreeBlackboard, mirakana::BehaviorTreeBlackboardCondition, mirakana::BehaviorTreeEvaluationContext, mirakana::evaluate_behavior_tree, mirakana::AiPerceptionAgent2D, mirakana::AiPerceptionTarget2D, mirakana::AiPerceptionSnapshot2D, mirakana::build_ai_perception_snapshot_2d, and mirakana::write_ai_perception_blackboard with game-supplied action statuses plus blackboard-driven condition leaves. Async tasks, decorators/services, scene/physics/navigation integration, utility AI, blackboard persistence/services, scripting, middleware, and editor graph authoring remain follow-up work.

Authored Scene Cook / Package Workflow v0, Automatic Cooked Package Assembly v0, Manifest-Driven Desktop Runtime Package Authoring v0, Editor Package Registration Apply GUI v0, Generated Desktop Runtime Package Scaffold v0, Generated Desktop Runtime Cooked Scene Package Scaffold v0, and Generated Desktop Runtime Material/Shader Package Scaffold v0 are implemented for tool/editor or generated desktop package workflows. sample_generated_desktop_runtime_material_shader_package remains a generated color-postprocess scaffold; sample_desktop_runtime_game is the depth-aware package proof that can require postprocess_depth_input_ready on ready D3D12/Vulkan hosts. Generated gameplay consumes cooked packages through mirakana_runtime/mirakana_runtime_scene and must not include mirakana_editor_core, run mirakana_tools, or parse scene source files at runtime. Nested prefab propagation, prefab conflict/merge UX, prefab instance link tracking, shader/material graph authoring, live shader generation, and broader packaged-game asset conventions remain follow-up work.

Source Asset Registration Command Tooling v1 is implemented for reviewed authoring workflows: use mirakana::plan_source_asset_registration and mirakana::apply_source_asset_registration, or the register-source-asset descriptor, to add GameEngine.SourceAssetRegistry.v1 rows plus AssetIdentity/import metadata projections. Do not run it from gameplay/runtime code; it does not execute importers, write cooked artifacts, update .geindex, generate shaders/material graphs, create renderer/RHI resources, or enable runtime source parsing.

Use mirakana::HeadlessRunner for default source-tree validation. Use mirakana::SdlDesktopGameHost only for games that select the optional desktop-game-runtime lane. Use mirakana::DesktopGameRunner, mirakana_runtime_host_sdl3, and mirakana_runtime_host_sdl3_presentation directly only for lower-level host adapter work. Declare bundled config/assets/cooked packages in game manifest runtimePackageFiles, declare cooked scene validation inputs in runtimeSceneValidationTargets, and use mirakana_add_desktop_runtime_game PACKAGE_FILES_FROM_MANIFEST; use tools/register-runtime-package-files.ps1 after reviewing candidate rows when adding existing-game package files.

Package-Visible Directional Shadow Filtering v0 is implemented for sample_desktop_runtime_game only: use --require-directional-shadow --require-directional-shadow-filtering to validate fixed sampled-depth 3x3 PCF metadata through first-party fields directional_shadow_status=ready, directional_shadow_ready=1, directional_shadow_filter_mode=fixed_pcf_3x3, directional_shadow_filter_taps=9, directional_shadow_filter_radius_texels=1, and framegraph_passes=3. Stable Directional Light-Space Policy v0 is available as renderer/scene-renderer planning through DirectionalShadowLightSpacePlan, but this sample smoke does not consume those matrices. Do not claim hardware comparison samplers, cascades, atlases, Metal shadow presentation, production shadow quality, or editor shadow authoring.

Animation CPU Skinning Foundation v0 is implemented as mirakana_animation value data only: use mirakana::AnimationCpuSkinningDesc and mirakana::skin_animation_vertices_cpu for deterministic skinned positions. Use mirakana::AnimationJointLocalTransform3d, mirakana::AnimationSkeleton3dDesc, mirakana::AnimationPose3d, mirakana::make_animation_rest_pose_3d, mirakana::build_animation_model_pose_3d, mirakana::sample_quat_keyframes, mirakana::AnimationJointTrack3dDesc, mirakana::AnimationJointTrack3dByteSource, mirakana::validate_animation_joint_tracks_3d, mirakana::sample_animation_local_pose_3d, mirakana::make_animation_joint_tracks_3d_from_f32_bytes, mirakana::runtime_scene::apply_runtime_scene_animation_pose_3d, mirakana::sample_and_apply_runtime_scene_render_animation_pose_3d, mirakana::runtime::runtime_animation_quaternion_clip_payload, mirakana::import_gltf_node_transform_animation_tracks_3d, and mirakana::import_gltf_node_transform_animation_quaternion_clip for host-independent unit-quaternion 3D local-pose/model-pose matrices, quaternion keyframe sampling, selected 3D joint-track local-pose application, narrow named-node runtime-scene pose application, first-party cooked quaternion clip byte-row runtime payload access, and LINEAR glTF node TRS 3D import/bridge with full unit-quaternion rotation rows, and mirakana::apply_animation_fabrik_ik_3d_solution_to_pose to write valid FABRIK 3D joint-position solutions back into local unit-quaternion rotations. Use mirakana::AnimationIkLocalRotationLimit3d, mirakana::validate_animation_ik_local_rotation_limits_3d, and mirakana::apply_animation_local_rotation_limits_3d for host-independent AnimationPose3d swing/twist clamps; the local-limit FABRIK 3D pose overload reports constraints that prevent matching a solved chain. Generated DesktopRuntime3DPackage quaternion package smoke is limited to cooked animation_quaternion_clip byte-row decode, named scene-node pose application, and quaternion_animation_scene_* counters. Use mirakana::solve_animation_two_bone_ik_3d_orientation when gameplay needs a deterministic two-bone 3D orientation basis, and mirakana::solve_animation_fabrik_ik_3d_chain when gameplay needs deterministic multi-segment 3D IK joint positions. GPU skinning, renderer/RHI animation execution, glTF IK import, authored IK assets, generated-game animation production beyond the smoke counters, and animation graph authoring remain follow-up work.

Generated DesktopRuntime3DPackage compute morph async telemetry may be required only through `--require-compute-morph-async-telemetry` and first-party `scene_gpu_compute_morph_async_*` counters. Gameplay code must not consume RHI devices, descriptor handles, queue/fence handles, GPU timestamps, native backend handles, output-ring internals, scheduling internals, per-queue fence internals, query heaps, raw timing values, clock calibration samples, calibrated timing rows, submitted-command timing rows, calibrated overlap diagnostics, submitted-overlap helper diagnostics, Vulkan compute pipeline internals, tangent-frame renderer/package consumption, or async overlap/performance data; Runtime RHI Compute Morph Async Overlap Evidence D3D12 v1, Runtime RHI Compute Morph Pipelined Output Ring D3D12 v1, Runtime RHI Compute Morph Pipelined Scheduling D3D12 v1, RHI D3D12 Per-Queue Fence Synchronization v1, RHI D3D12 Queue Timestamp Measurement Foundation v1, RHI D3D12 Queue Clock Calibration Foundation v1, RHI D3D12 Calibrated Queue Timing Diagnostics v1, Runtime RHI Compute Morph Calibrated Overlap Diagnostics D3D12 v1, RHI D3D12 Submitted Command Calibrated Timing Scopes v1, Runtime RHI Compute Morph Submitted Overlap Diagnostics D3D12 v1, and RHI Vulkan Compute Dispatch Foundation v1 are completed runtime/RHI-only or backend-private evidence. Runtime RHI Compute Morph Vulkan Proof v1, Runtime RHI Compute Morph Renderer Consumption Vulkan v1, and Runtime RHI Compute Morph NORMAL/TANGENT Output Vulkan v1 are completed backend-private proofs only. Generated 3D Compute Morph Package Smoke Vulkan v1 is complete host-owned POSITION package smoke evidence through `DesktopRuntime3DPackage`, `SdlDesktopPresentationVulkanSceneRendererDesc`, `--require-compute-morph`, explicit SPIR-V artifacts, and first-party counters.

Do not expose SDL, OS, GPU, RHI backend, Android SDK, or editor handles to gameplay/HUD code. Select android-gameactivity only after pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-mobile-packaging.ps1 reports Android ready, and treat Apple/iOS packaging as macOS/Xcode gated.
"""
