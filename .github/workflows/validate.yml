      - name: Restore ENet build cache
        id: restore-network-enet-build
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            out/build/network-enet
            out/build/installed-network-enet-consumer
            out/install/network-enet
          key: ${{ runner.os }}-network-enet-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-network-enet-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-
            ${{ runner.os }}-network-enet-build-${{ steps.windows-toolchain-cache.outputs.identity }}-

      - name: Bootstrap ENet dependencies
        shell: pwsh
        run: ./tools/bootstrap-deps.ps1 -Feature network-enet

      - name: Validate optional ENet network adapter
        shell: pwsh
        run: ./tools/validate-network-enet.ps1

      - name: Save ENet vcpkg tool checkout cache
        if: ${{ success() && !cancelled() && steps.restore-network-enet-vcpkg-tool.outcome == 'success' && steps.restore-network-enet-vcpkg-tool.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ steps.restore-network-enet-vcpkg-tool.outputs.cache-primary-key }}

      - name: Save ENet vcpkg package cache
        if: ${{ success() && !cancelled() && steps.restore-network-enet-vcpkg-package.outcome == 'success' && steps.restore-network-enet-vcpkg-package.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ steps.restore-network-enet-vcpkg-package.outputs.cache-primary-key }}

      - name: Save ENet vcpkg installed cache
        if: ${{ success() && !cancelled() && steps.restore-network-enet-vcpkg-installed.outcome == 'success' && steps.restore-network-enet-vcpkg-installed.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ steps.restore-network-enet-vcpkg-installed.outputs.cache-primary-key }}

      - name: Save ENet build cache
        if: ${{ success() && !cancelled() && steps.restore-network-enet-build.outcome == 'success' && steps.restore-network-enet-build.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            out/build/network-enet
            out/build/installed-network-enet-consumer
            out/install/network-enet
          key: ${{ steps.restore-network-enet-build.outputs.cache-primary-key }}

      - name: Upload ENet test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-network-enet-test-logs
          retention-days: 14
          include-hidden-files: false
          path: out/build/network-enet/Testing/**/*.log
