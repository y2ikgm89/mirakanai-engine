name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Select PR validation tier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      windows_msvc: ${{ steps.classify.outputs.windows_msvc }}
      windows_cpu_profiling_host: ${{ steps.classify.outputs.windows_cpu_profiling_host }}
      windows_asset_importers: ${{ steps.classify.outputs.windows_asset_importers }}
      windows_desktop_editor: ${{ steps.classify.outputs.windows_desktop_editor }}
      windows_network_enet: ${{ steps.classify.outputs.windows_network_enet }}
      linux_cmake: ${{ steps.classify.outputs.linux_cmake }}
      linux_vulkan_host: ${{ steps.classify.outputs.linux_vulkan_host }}
      linux_sanitizers: ${{ steps.classify.outputs.linux_sanitizers }}
      linux_coverage: ${{ steps.classify.outputs.linux_coverage }}
      full_static_analysis: ${{ steps.classify.outputs.full_static_analysis }}
      macos_metal_cmake: ${{ steps.classify.outputs.macos_metal_cmake }}
      metal_host_evidence: ${{ steps.classify.outputs.metal_host_evidence }}
      ios_metal_evidence: ${{ steps.classify.outputs.ios_metal_evidence }}
      windows_cpp23_release: ${{ steps.classify.outputs.windows_cpp23_release }}
      selected_lanes: ${{ steps.classify.outputs.selected_lanes }}
      classification_reasons: ${{ steps.classify.outputs.classification_reasons }}
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify touched surfaces
        id: classify
        shell: pwsh
        run: |
          $runAll = "${{ github.event_name }}" -ne "pull_request"
          if ($runAll) {
            $selection = ./tools/classify-pr-validation-tier.ps1 -RunAll -GitHubOutputPath $env:GITHUB_OUTPUT | ConvertFrom-Json
          } else {
            $base = "${{ github.event.pull_request.base.sha }}"
            $head = "${{ github.event.pull_request.head.sha }}"
            $files = @(git diff --name-only $base $head)
            if ($LASTEXITCODE -ne 0) {
              Write-Error "failed to compute PR file diff"
            }

            $selection = ./tools/classify-pr-validation-tier.ps1 -ChangedPath $files -GitHubOutputPath $env:GITHUB_OUTPUT | ConvertFrom-Json
          }

          @(
            "### PR validation tier selection",
            "",
            "- selected_lanes: $($selection.selected_lanes)",
            "- classification_reasons: $($selection.classification_reasons)"
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8

  agent-static:
    name: Agent Static Guards
    needs: changes
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check PR diff whitespace
        if: ${{ github.event_name == 'pull_request' }}
        shell: pwsh
        run: git diff --check ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Generate renderer clean-room legal review input
        shell: pwsh
        run: ./tools/generate-renderer-clean-room-legal-review-input.ps1 -Mode Generate

      - name: Upload renderer clean-room legal review artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renderer-clean-room-legal-review-artifacts
          retention-days: 14
          compression-level: 0
          include-hidden-files: false
          path: artifacts/renderer/clean-room-legal-review/renderer-commercial-readiness/**
          if-no-files-found: error

      - name: Run static validation
        shell: pwsh
        run: ./tools/validate.ps1 -StaticOnly -StaticJobs 1 -StaticCheckTimeoutSeconds 120

  windows:
    name: Windows MSVC
    needs: changes
    if: needs.changes.outputs.windows_msvc == 'true'
    runs-on: windows-2025-vs2026
    timeout-minutes: 120
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore vcpkg tool checkout cache
        id: restore-vcpkg-tool
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ runner.os }}-vcpkg-tool-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-tool-

      - name: Clone vcpkg tool checkout
        shell: pwsh
        run: |
          if (Test-Path external/vcpkg/.git) {
            Write-Information "external/vcpkg restored from cache" -InformationAction Continue
          } else {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }

      - name: Update vcpkg tool baseline
        shell: pwsh
        run: |
          $manifest = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $targetBaseline = $manifest.'builtin-baseline'
          if (!(Test-Path external/vcpkg/.git)) {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }
          try {
            $currentBaseline = git -C external/vcpkg rev-parse HEAD
            $resolvedTarget = git -C external/vcpkg rev-parse $targetBaseline
          } catch {
            $currentBaseline = [string]::Empty
            $resolvedTarget = [string]::Empty
          }
          if ([string]::IsNullOrWhiteSpace($resolvedTarget) -or $currentBaseline -ne $resolvedTarget) {
            git -C external/vcpkg fetch --depth 1 origin $targetBaseline
            git -C external/vcpkg checkout --force $targetBaseline
          }

      - name: Capture Windows toolchain cache identity
        id: windows-toolchain-cache
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere.exe was not found at '$vswhere'"
          }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio with MSBuild was not found"
          }
          $toolRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $clPath = Get-ChildItem -LiteralPath $toolRoot -Directory |
            Sort-Object -Property Name -Descending |
            ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\cl.exe" } |
            Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($clPath)) {
            throw "MSVC cl.exe was not found below '$toolRoot'"
          }
          $identityText = @($env:ImageOS, $env:ImageVersion, $vsPath, $clPath) -join "|"
          $identityBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($identityText))
          $identity = -join ($identityBytes | ForEach-Object { $_.ToString("x2") })
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "identity=$identity"
          Write-Information "windows-toolchain-cache-identity=$identity" -InformationAction Continue

      - name: Restore vcpkg package cache
        id: restore-vcpkg-package
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Restore vcpkg installed cache
        id: restore-vcpkg-installed
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: Restore Windows dev build cache
        id: restore-dev-build
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/dev
          key: ${{ runner.os }}-dev-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-dev-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-
            ${{ runner.os }}-dev-build-${{ steps.windows-toolchain-cache.outputs.identity }}-

      - name: Bootstrap vcpkg dependencies
        shell: pwsh
        run: ./tools/bootstrap-deps.ps1 -Feature desktop-runtime

      - name: Validate
        shell: pwsh
        run: ./tools/validate.ps1 -SkipStaticChecks -SkipTidySmoke

      - name: Save vcpkg tool checkout cache
        if: ${{ success() && !cancelled() && steps.restore-vcpkg-tool.outcome == 'success' && steps.restore-vcpkg-tool.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ steps.restore-vcpkg-tool.outputs.cache-primary-key }}

      - name: Save vcpkg package cache
        if: ${{ success() && !cancelled() && steps.restore-vcpkg-package.outcome == 'success' && steps.restore-vcpkg-package.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ steps.restore-vcpkg-package.outputs.cache-primary-key }}

      - name: Save vcpkg installed cache
        if: ${{ success() && !cancelled() && steps.restore-vcpkg-installed.outcome == 'success' && steps.restore-vcpkg-installed.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ steps.restore-vcpkg-installed.outputs.cache-primary-key }}

      - name: Save Windows dev build cache
        if: ${{ success() && !cancelled() && steps.restore-dev-build.outcome == 'success' && steps.restore-dev-build.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/dev
          key: ${{ steps.restore-dev-build.outputs.cache-primary-key }}

      - name: Upload Windows test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-test-logs
          retention-days: 14
          include-hidden-files: false
          path: |
            out/build/dev/Testing/**/*.log
          if-no-files-found: warn

  windows-cpu-profiling-host:
    name: Windows CPU Profiling Host Evidence
    needs: changes
    if: needs.changes.outputs.windows_cpu_profiling_host == 'true'
    runs-on: windows-2025-vs2026
    timeout-minutes: 60
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate CPU profiling matrix host gate
        shell: pwsh
        run: ./tools/validate-cpu-profiling-matrix-host-gate.ps1

      - name: Upload CPU profiling host evidence
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-cpu-profiling-host-evidence
          retention-days: 14
          include-hidden-files: false
          path: out/cpu-profiling-matrix-host-gate/**
          if-no-files-found: warn

  windows-asset-importers:
    name: Windows Optional Asset Importers
    needs: changes
    if: needs.changes.outputs.windows_asset_importers == 'true'
    runs-on: windows-2025-vs2026
    timeout-minutes: 90
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore asset importers vcpkg tool checkout cache
        id: restore-asset-importers-vcpkg-tool
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ runner.os }}-vcpkg-tool-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-tool-

      - name: Clone asset importers vcpkg tool checkout
        shell: pwsh
        run: |
          if (Test-Path external/vcpkg/.git) {
            Write-Information "external/vcpkg restored from cache" -InformationAction Continue
          } else {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }

      - name: Update asset importers vcpkg tool baseline
        shell: pwsh
        run: |
          $manifest = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $targetBaseline = $manifest.'builtin-baseline'
          if (!(Test-Path external/vcpkg/.git)) {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }
          try {
            $currentBaseline = git -C external/vcpkg rev-parse HEAD
            $resolvedTarget = git -C external/vcpkg rev-parse $targetBaseline
          } catch {
            $currentBaseline = [string]::Empty
            $resolvedTarget = [string]::Empty
          }
          if ([string]::IsNullOrWhiteSpace($resolvedTarget) -or $currentBaseline -ne $resolvedTarget) {
            git -C external/vcpkg fetch --depth 1 origin $targetBaseline
            git -C external/vcpkg checkout --force $targetBaseline
          }

      - name: Capture Windows toolchain cache identity
        id: windows-toolchain-cache
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere.exe was not found at '$vswhere'"
          }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio with MSBuild was not found"
          }
          $toolRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $clPath = Get-ChildItem -LiteralPath $toolRoot -Directory |
            Sort-Object -Property Name -Descending |
            ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\cl.exe" } |
            Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($clPath)) {
            throw "MSVC cl.exe was not found below '$toolRoot'"
          }
          $identityText = @($env:ImageOS, $env:ImageVersion, $vsPath, $clPath) -join "|"
          $identityBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($identityText))
          $identity = -join ($identityBytes | ForEach-Object { $_.ToString("x2") })
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "identity=$identity"
          Write-Information "windows-toolchain-cache-identity=$identity" -InformationAction Continue

      - name: Restore asset importers vcpkg package cache
        id: restore-asset-importers-vcpkg-package
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Restore asset importers vcpkg installed cache
        id: restore-asset-importers-vcpkg-installed
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: Restore asset importers build cache
        id: restore-asset-importers-build
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            out/build/asset-importers
            out/build/installed-asset-importers-consumer
            out/install/asset-importers
          key: ${{ runner.os }}-asset-importers-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-asset-importers-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-
            ${{ runner.os }}-asset-importers-build-${{ steps.windows-toolchain-cache.outputs.identity }}-

      - name: Bootstrap asset importer dependencies
        shell: pwsh
        run: ./tools/bootstrap-deps.ps1 -Feature asset-importers

      - name: Validate optional asset importers
        shell: pwsh
        run: ./tools/build-asset-importers.ps1

      - name: Save asset importers vcpkg tool checkout cache
        if: ${{ success() && !cancelled() && steps.restore-asset-importers-vcpkg-tool.outcome == 'success' && steps.restore-asset-importers-vcpkg-tool.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ steps.restore-asset-importers-vcpkg-tool.outputs.cache-primary-key }}

      - name: Save asset importers vcpkg package cache
        if: ${{ success() && !cancelled() && steps.restore-asset-importers-vcpkg-package.outcome == 'success' && steps.restore-asset-importers-vcpkg-package.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ steps.restore-asset-importers-vcpkg-package.outputs.cache-primary-key }}

      - name: Save asset importers vcpkg installed cache
        if: ${{ success() && !cancelled() && steps.restore-asset-importers-vcpkg-installed.outcome == 'success' && steps.restore-asset-importers-vcpkg-installed.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ steps.restore-asset-importers-vcpkg-installed.outputs.cache-primary-key }}

      - name: Save asset importers build cache
        if: ${{ success() && !cancelled() && steps.restore-asset-importers-build.outcome == 'success' && steps.restore-asset-importers-build.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            out/build/asset-importers
            out/build/installed-asset-importers-consumer
            out/install/asset-importers
          key: ${{ steps.restore-asset-importers-build.outputs.cache-primary-key }}

      - name: Upload asset importer test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-asset-importers-test-logs
          retention-days: 14
          include-hidden-files: false
          path: out/build/asset-importers/Testing/**/*.log
          if-no-files-found: warn

  windows-desktop-editor:
    name: Windows Native Desktop Editor
    needs: changes
    if: needs.changes.outputs.windows_desktop_editor == 'true'
    runs-on: windows-2025-vs2026
    timeout-minutes: 90
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Capture Windows toolchain cache identity
        id: windows-toolchain-cache
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere.exe was not found at '$vswhere'"
          }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio with MSBuild was not found"
          }
          $toolRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $clPath = Get-ChildItem -LiteralPath $toolRoot -Directory |
            Sort-Object -Property Name -Descending |
            ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\cl.exe" } |
            Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($clPath)) {
            throw "MSVC cl.exe was not found below '$toolRoot'"
          }
          $identityText = @($env:ImageOS, $env:ImageVersion, $vsPath, $clPath) -join "|"
          $identityBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($identityText))
