      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 2G
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
