        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore Linux sanitizer ccache
        id: restore-linux-sanitizer-ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-asan-${{ hashFiles('CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-asan-

      - name: Restore Linux sanitizer build cache
        id: restore-linux-sanitizer-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/clang-asan-ubsan
          key: ${{ runner.os }}-linux-asan-ubsan-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-linux-asan-ubsan-

      - name: Verify preinstalled toolchain and install ccache
        run: |
          command -v clang >/dev/null 2>&1 || { echo "clang is required on ubuntu-latest runner images"; exit 1; }
          command -v ninja >/dev/null 2>&1 || { echo "ninja is required on ubuntu-latest runner images"; exit 1; }
