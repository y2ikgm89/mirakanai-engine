          path: artifacts/renderer/package-commercial-quality-host-evidence/current-run/**
          if-no-files-found: error

      - name: Collect renderer D3D12 commercial quality host evidence
        shell: pwsh
        run: |
          $artifactRoot = "artifacts/renderer/d3d12-commercial-quality-host-evidence/current-run"
          $supplementRoot = "$artifactRoot/supplement"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          $packageSmokeLog = "$artifactRoot/package-smoke.log"
          $supplementLog = "$artifactRoot/supplement-output.log"
          $collectorLog = "$artifactRoot/collector-output.log"

          $packageSmokeLines = @(& ./tools/package-desktop-runtime.ps1 `
