            out/build/ci-linux-tidy/.cmake/api/v1/reply/*.json
          if-no-files-found: warn

  macos:
    name: macOS Metal CMake
    needs: changes
    if: needs.changes.outputs.macos_metal_cmake == 'true'
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 2G
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore macOS ccache
        id: restore-macos-ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache-${{ hashFiles('CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-macos-ccache-

      - name: Restore macOS build cache
        id: restore-macos-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/ci-macos-appleclang
          key: ${{ runner.os }}-macos-clang-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-macos-clang-

      - name: Ensure build tools are available
        shell: bash
        run: |
          command -v ninja >/dev/null 2>&1 || { echo "ninja is required on macos-latest runner images"; exit 1; }
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi
          ninja --version
          ccache --version

      - name: Prepare ccache
        run: |
          ccache --zero-stats

      - name: Environment Metal aggregate host evidence recipe and optimization artifacts
        if: needs.changes.outputs.metal_host_evidence == 'true'
        shell: pwsh
        run: |
          $jobs = [int](& sysctl -n hw.logicalcpu)
          ./tools/generate-environment-metal-optimization-artifacts.ps1 -Jobs $jobs -RequireReady

      - name: Renderer Metal memory profiling host artifacts
        if: needs.changes.outputs.metal_host_evidence == 'true'
        shell: pwsh
        run: |
          $jobs = [int](& sysctl -n hw.logicalcpu)
          # GitHub-hosted macOS can be Metal-capable while still rejecting MTLResidencySet creation.
          # Keep -RequireReady for a physical/self-hosted Apple proof host; this lane records host-gated diagnostics.
          ./tools/generate-renderer-metal-memory-profiling-host-artifacts.ps1 -Jobs $jobs

      - name: Upload Metal optimization artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: metal-host-optimization-artifacts
          retention-days: 14
          compression-level: 0
          include-hidden-files: false
          path: artifacts/environment/optimization/2026-06-19-metal-host-xctrace-smoke/metal_apple_host/**
          if-no-files-found: warn

      - name: Upload Renderer Metal memory profiling host artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renderer-metal-memory-profiling-host-artifacts
          retention-days: 14
          compression-level: 0
          include-hidden-files: false
          path: artifacts/renderer/metal-memory-profiling-host-evidence/**
          if-no-files-found: warn

      - name: Upload renderer commercial readiness retained root (Metal host)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renderer-commercial-readiness-final-retained-root
          retention-days: 14
          compression-level: 0
          include-hidden-files: false
          path: artifacts/renderer/commercial-readiness-evidence/final-retained/**
          if-no-files-found: warn

      - name: Validate Metal weather solver host gate
        shell: pwsh
        run: ./tools/validate-environment-weather-metal-solver-host-gate.ps1

      - name: Configure
        run: cmake --preset ci-macos-appleclang

      - name: Build
        run: cmake --build --preset ci-macos-appleclang --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Test
        run: ctest --preset ci-macos-appleclang --output-on-failure --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Show ccache stats
        if: ${{ always() && !cancelled() }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache is not installed; skipping stats after an earlier checkout or toolchain setup failure"
          fi

      - name: Upload macOS test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-test-logs
          retention-days: 14
          include-hidden-files: false
          path: out/build/ci-macos-appleclang/Testing/**/*.log
          if-no-files-found: warn

  ios-metal:
    name: iOS Metal Evidence
    needs: changes
    if: needs.changes.outputs.ios_metal_evidence == 'true'
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcode-select -p
          xcrun --sdk iphonesimulator --show-sdk-path
          xcrun simctl list runtimes
          xcrun simctl list devices available

      - name: Mobile packaging diagnostics
        shell: pwsh
        run: ./tools/check-mobile-packaging.ps1 -RequireApple

      - name: Build iOS Simulator package
        shell: pwsh
        run: ./tools/build-mobile-apple.ps1 -Game sample_headless -Configuration Debug -Platform Simulator

      - name: Validate iOS Metal platform evidence
        shell: pwsh
        run: |
          $expected = @(
            "validation_recipe=environment-platform-ios-metal-package",
            "host=macos",
            "xcode_ios_sdk_ready=1",
            "ios_simulator_or_device_ready=1",
            "ios_metal_feature_set_checked=1",
            "ios_package_smoke_ready=1",
            "ios_metal_command_queue_ready=1",
            "ios_metal_pipeline_ready=1",
            "ios_metal_command_buffer_ready=1",
            "ios_metal_readback_ready=1",
            "environment_platform_ios_metal_ready=1",
            "environment_platform_requires_ios_metal_host_evidence=0",
            "environment_all_platform_unconditional_ready=0"
          )
          ./tools/validate-apple-metal-platform-host.ps1 -Platform ios -RequireReady -SkipIosBuild -ExpectedEvidenceCounters $expected

      - name: Upload iOS build output
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-metal-evidence-build
          retention-days: 14
          include-hidden-files: false
          path: |
            out/build/ios-Simulator-sample_headless-Debug/**/*.app
            out/build/ios-Simulator-sample_headless-Debug/**/*.log
          if-no-files-found: warn

  renderer-commercial-artifact-intake:
    name: Renderer Commercial Artifact Intake
    needs:
      - changes
      - agent-static
      - windows
      - windows-cpp23
      - linux-vulkan
      - macos
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Capture current workflow artifact list
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $intakeRoot = "artifacts/renderer/commercial-readiness-evidence/current-run-artifact-intake"
          New-Item -ItemType Directory -Force -Path $intakeRoot | Out-Null
          $artifactListPath = Join-Path $intakeRoot "workflow-artifacts.json"
          $artifactList = @(gh api -H "Accept: application/vnd.github+json" "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100" 2>&1)
          if ($LASTEXITCODE -ne 0) {
            Write-Error "failed to list workflow run artifacts: $([string]::Join("`n", $artifactList))"
          }
          Set-Content -LiteralPath $artifactListPath -Encoding utf8NoBOM -Value ([string]::Join("`n", $artifactList))

      - name: Import current workflow renderer commercial artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $importLines = @(./tools/import-renderer-commercial-readiness-final-retained-root-artifacts.ps1 -Mode Import -RepoFullName "${{ github.repository }}" -RunId "${{ github.run_id }}" -OutputRootRelative artifacts/renderer/commercial-readiness-evidence/current-run-artifact-intake -ArtifactListJsonRelative artifacts/renderer/commercial-readiness-evidence/current-run-artifact-intake/workflow-artifacts.json)
          $logPath = "artifacts/renderer/commercial-readiness-evidence/current-run-artifact-intake/import-output.log"
          Set-Content -LiteralPath $logPath -Encoding utf8NoBOM -Value $importLines
          foreach ($requiredLine in @(
              "renderer_commercial_readiness=0",
              "renderer_commercial_readiness_final_retained_root_artifact_import_manifest=artifacts/renderer/commercial-readiness-evidence/current-run-artifact-intake/intake-manifest.json"
            )) {
            if (-not $importLines.Contains($requiredLine)) {
              Write-Error "renderer commercial artifact intake missing expected non-promoting line: $requiredLine"
            }
          }

      - name: Upload renderer commercial readiness current-run artifact intake
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renderer-commercial-readiness-current-run-artifact-intake
          retention-days: 14
          compression-level: 0
          include-hidden-files: false
          path: artifacts/renderer/commercial-readiness-evidence/current-run-artifact-intake/**
          if-no-files-found: error

  pr-gate:
    name: PR Gate
    needs:
      - changes
      - agent-static
      - windows
      - windows-cpu-profiling-host
      - windows-asset-importers
      - windows-desktop-editor
      - windows-network-enet
      - linux
      - linux-vulkan
      - windows-cpp23
      - linux-coverage
      - linux-sanitizers
      - static-analysis
      - macos
      - ios-metal
      - renderer-commercial-artifact-intake
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify selected validation tier
        shell: pwsh
        run: |
          $needs = '${{ toJson(needs) }}' | ConvertFrom-Json
          $failed = @()
          foreach ($job in $needs.PSObject.Properties) {
            if ($job.Value.result -in @("failure", "cancelled")) {
              $failed += "$($job.Name)=$($job.Value.result)"
            }
          }
          $laneJobs = [ordered]@{
            windows_msvc = "windows"
            windows_cpu_profiling_host = "windows-cpu-profiling-host"
            windows_asset_importers = "windows-asset-importers"
            windows_desktop_editor = "windows-desktop-editor"
            windows_network_enet = "windows-network-enet"
            linux_cmake = "linux"
            linux_vulkan_host = "linux-vulkan"
            linux_sanitizers = "linux-sanitizers"
            linux_coverage = "linux-coverage"
            full_static_analysis = "static-analysis"
            macos_metal_cmake = "macos"
            metal_host_evidence = "macos"
            ios_metal_evidence = "ios-metal"
            windows_cpp23_release = "windows-cpp23"
          }
          $outputs = $needs.changes.outputs
          foreach ($laneName in $laneJobs.Keys) {
            $selected = [string]$outputs.$laneName -eq "true"
            if (-not $selected) {
              continue
            }

            $jobName = $laneJobs[$laneName]
            $jobProperty = $needs.PSObject.Properties[$jobName]
            if ($null -eq $jobProperty) {
              $failed += "$laneName selected lane did not complete successfully: missing job $jobName"
              continue
            }

            $jobResult = [string]$jobProperty.Value.result
            if ($jobResult -ne "success") {
              $failed += "$laneName selected lane did not complete successfully: $jobName=$jobResult"
            }
          }
          if ($failed.Count -gt 0) {
            Write-Error "PR validation gate failed: $($failed -join ', ')"
          }
          "PR validation gate passed"
