name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Select PR validation tier
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.classify.outputs.windows }}
      linux: ${{ steps.classify.outputs.linux }}
      linux_sanitizers: ${{ steps.classify.outputs.linux_sanitizers }}
      static_analysis: ${{ steps.classify.outputs.static_analysis }}
      macos: ${{ steps.classify.outputs.macos }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify touched surfaces
        id: classify
        shell: pwsh
        run: |
          $runAll = "${{ github.event_name }}" -ne "pull_request"
          if ($runAll) {
            "windows=true" >> $env:GITHUB_OUTPUT
            "linux=true" >> $env:GITHUB_OUTPUT
            "linux_sanitizers=true" >> $env:GITHUB_OUTPUT
            "static_analysis=true" >> $env:GITHUB_OUTPUT
            "macos=true" >> $env:GITHUB_OUTPUT
            return
          }

          $base = "${{ github.event.pull_request.base.sha }}"
          $head = "${{ github.event.pull_request.head.sha }}"
          $files = @(git diff --name-only $base $head)
          if ($LASTEXITCODE -ne 0) {
            Write-Error "failed to compute PR file diff"
          }

          $ciOrWorkflow = $false
          $runtimeOrBuild = $false
          $staticPolicy = $false
          # Docs/agent/rules/subagent-only changes leave heavy hosted lanes disabled.
          foreach ($file in $files) {
            $path = $file -replace "\\", "/"
            if ($path -match "^\.github/workflows/") {
              $ciOrWorkflow = $true
            }
            if (
              $path -eq "CMakeLists.txt" -or
              $path -match "/CMakeLists\.txt$" -or
              $path -eq "CMakePresets.json" -or
              $path -match "^(cmake|engine|editor|games|platform|runtime|shaders|examples|tests)/" -or
              $path -eq "vcpkg.json" -or
              $path -match "^tools/(validate|build|test|bootstrap-deps|check-toolchain|check-tidy|check-format|check-coverage|check-dependency-policy|check-cpp-standard-policy|evaluate-cpp23|package|package-desktop-runtime|check-public-api-boundaries|check-shader-toolchain|run-validation-recipe|common)\.ps1$"
            ) {
              $runtimeOrBuild = $true
            }
            if ($path -eq ".clang-tidy" -or $path -eq ".clang-format" -or $path -match "^tools/check-tidy\.ps1$") {
              $staticPolicy = $true
            }
          }

          $windows = $ciOrWorkflow -or $runtimeOrBuild
          $linux = $ciOrWorkflow -or $runtimeOrBuild
          $linuxSanitizers = $ciOrWorkflow -or $runtimeOrBuild
          $staticAnalysis = $ciOrWorkflow -or $runtimeOrBuild -or $staticPolicy
          $macos = $ciOrWorkflow -or $runtimeOrBuild

          "windows=$($windows.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "linux=$($linux.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "linux_sanitizers=$($linuxSanitizers.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "static_analysis=$($staticAnalysis.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "macos=$($macos.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

  agent-static:
    name: Agent Static Guards
    needs: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR diff whitespace
        shell: pwsh
        run: git diff --check ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Check agent file contracts
        shell: pwsh
        run: ./tools/check-agents.ps1

      - name: Check JSON contracts
        shell: pwsh
        run: ./tools/check-json-contracts.ps1

      - name: Check AI integration
        shell: pwsh
        run: ./tools/check-ai-integration.ps1

      - name: Check CI matrix contract
        shell: pwsh
        run: ./tools/check-ci-matrix.ps1

  windows:
    name: Windows MSVC
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone vcpkg tool checkout
        shell: pwsh
        run: |
          $manifest = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git external/vcpkg
          git -C external/vcpkg checkout $manifest.'builtin-baseline'

      - name: Bootstrap vcpkg dependencies (Windows dev preset enables desktop GUI)
        shell: pwsh
        run: ./tools/bootstrap-deps.ps1

      - name: Validate
        shell: pwsh
        run: ./tools/validate.ps1

      - name: C++23 Release Evaluation
        shell: pwsh
        run: ./tools/evaluate-cpp23.ps1 -Release

      - name: Upload Windows test logs
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-test-logs
          path: |
            out/build/dev/Testing/**/*.log
            out/build/cpp23-eval/Testing/**/*.log
            out/build/cpp23-release-preset-eval/Testing/**/*.log
          if-no-files-found: warn

      - name: Upload Windows packages
        if: ${{ success() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-packages
          path: |
            out/build/cpp23-release-preset-eval/*.zip
            out/build/cpp23-release-preset-eval/*.zip.sha256
          if-no-files-found: error

  linux:
    name: Linux CMake
    needs: changes
    if: needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build and coverage tools
        run: sudo apt-get update && sudo apt-get install -y clang g++ lcov ninja-build

      - name: Configure
        run: cmake --preset ci-linux-clang

      - name: Build
        run: cmake --build --preset ci-linux-clang

      - name: Test
        run: ctest --preset ci-linux-clang --output-on-failure

      - name: Coverage
        shell: pwsh
        run: ./tools/check-coverage.ps1 -Strict

      - name: Upload Linux test logs
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-test-logs
          path: |
            out/build/ci-linux-clang/Testing/**/*.log
            out/build/coverage/Testing/**/*.log
          if-no-files-found: warn

      - name: Upload Linux coverage output
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-coverage
          path: |
            out/build/coverage/Testing/**
            out/build/coverage/coverage*.info
          if-no-files-found: warn

  linux-sanitizers:
    name: Linux Clang ASan/UBSan
    needs: changes
    if: needs.changes.outputs.linux_sanitizers == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Configure
        run: cmake --preset clang-asan-ubsan

      - name: Build
        run: cmake --build --preset clang-asan-ubsan

      - name: Test
        env:
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --preset clang-asan-ubsan --output-on-failure

      - name: Upload sanitizer test logs
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-sanitizer-test-logs
          path: out/build/clang-asan-ubsan/Testing/**/*.log
          if-no-files-found: warn

  static-analysis:
    name: Full Repository Static Analysis
    needs: changes
    if: needs.changes.outputs.static_analysis == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install static analysis tools
        run: sudo apt-get update && sudo apt-get install -y clang clang-tidy ninja-build

      - name: Run clang-tidy
        shell: pwsh
        run: ./tools/check-tidy.ps1 -Strict -Preset ci-linux-tidy -Jobs 0

      - name: Upload static analysis logs
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-tidy-logs
          path: |
            out/build/ci-linux-tidy/compile_commands.json
            out/build/ci-linux-tidy/.cmake/api/v1/reply/*.json
          if-no-files-found: warn

  macos:
    name: macOS Metal CMake
    needs: changes
    if: needs.changes.outputs.macos == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure Ninja is available
        shell: bash
        run: |
          if command -v ninja >/dev/null 2>&1; then
            ninja --version
          else
            brew install ninja
          fi

      - name: Configure
        run: cmake --preset ci-macos-appleclang

      - name: Build
        run: cmake --build --preset ci-macos-appleclang

      - name: Test
        run: ctest --preset ci-macos-appleclang --output-on-failure

      - name: Upload macOS test logs
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: macos-test-logs
          path: out/build/ci-macos-appleclang/Testing/**/*.log
          if-no-files-found: warn

  pr-gate:
    name: PR Gate
    needs:
      - changes
      - agent-static
      - windows
      - linux
      - linux-sanitizers
      - static-analysis
      - macos
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify selected validation tier
        shell: pwsh
        run: |
          $needs = '${{ toJson(needs) }}' | ConvertFrom-Json
          $failed = @()
          foreach ($job in $needs.PSObject.Properties) {
            if ($job.Value.result -in @("failure", "cancelled")) {
              $failed += "$($job.Name)=$($job.Value.result)"
            }
          }
          if ($failed.Count -gt 0) {
            Write-Error "PR validation gate failed: $($failed -join ', ')"
          }
          "PR validation gate passed"
