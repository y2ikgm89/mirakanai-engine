    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore ENet vcpkg tool checkout cache
        id: restore-network-enet-vcpkg-tool
        continue-on-error: true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ runner.os }}-vcpkg-tool-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-tool-

      - name: Clone ENet vcpkg tool checkout
        shell: pwsh
        run: |
          if (Test-Path external/vcpkg/.git) {
            Write-Information "external/vcpkg restored from cache" -InformationAction Continue
          } else {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }

      - name: Update ENet vcpkg tool baseline
        shell: pwsh
        run: |
          $manifest = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $targetBaseline = $manifest.'builtin-baseline'
          if (!(Test-Path external/vcpkg/.git)) {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }
          try {
            $currentBaseline = git -C external/vcpkg rev-parse HEAD
            $resolvedTarget = git -C external/vcpkg rev-parse $targetBaseline
          } catch {
            $currentBaseline = [string]::Empty
            $resolvedTarget = [string]::Empty
          }
          if ([string]::IsNullOrWhiteSpace($resolvedTarget) -or $currentBaseline -ne $resolvedTarget) {
            git -C external/vcpkg fetch --depth 1 origin $targetBaseline
            git -C external/vcpkg checkout --force $targetBaseline
          }

      - name: Capture Windows toolchain cache identity
        id: windows-toolchain-cache
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere.exe was not found at '$vswhere'"
          }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio with MSBuild was not found"
          }
          $toolRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $clPath = Get-ChildItem -LiteralPath $toolRoot -Directory |
            Sort-Object -Property Name -Descending |
            ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\cl.exe" } |
            Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($clPath)) {
            throw "MSVC cl.exe was not found below '$toolRoot'"
          }
          $identityText = @($env:ImageOS, $env:ImageVersion, $vsPath, $clPath) -join "|"
          $identityBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($identityText))
          $identity = -join ($identityBytes | ForEach-Object { $_.ToString("x2") })
