name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  windows:
    name: Windows MSVC
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone vcpkg tool checkout
        shell: pwsh
        run: |
          $manifest = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git external/vcpkg
          git -C external/vcpkg checkout $manifest.'builtin-baseline'

      - name: Bootstrap vcpkg dependencies (Windows dev preset enables desktop GUI)
        shell: pwsh
        run: ./tools/bootstrap-deps.ps1

      - name: Validate
        shell: pwsh
        run: ./tools/validate.ps1

      - name: C++23 Release Evaluation
        shell: pwsh
        run: ./tools/evaluate-cpp23.ps1 -Release

      - name: Upload Windows test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-test-logs
          path: |
            out/build/dev/Testing/**/*.log
            out/build/cpp23-eval/Testing/**/*.log
            out/build/cpp23-release-preset-eval/Testing/**/*.log
          if-no-files-found: warn

      - name: Upload Windows packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-packages
          path: |
            out/build/cpp23-release-preset-eval/*.zip
            out/build/cpp23-release-preset-eval/*.zip.sha256
          if-no-files-found: warn

  linux:
    name: Linux CMake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build and coverage tools
        run: sudo apt-get update && sudo apt-get install -y clang g++ lcov ninja-build

      - name: Configure
        run: cmake --preset ci-linux-clang

      - name: Build
        run: cmake --build --preset ci-linux-clang

      - name: Test
        run: ctest --preset ci-linux-clang --output-on-failure

      - name: Coverage
        shell: pwsh
        run: ./tools/check-coverage.ps1 -Strict

      - name: Upload Linux test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-test-logs
          path: |
            out/build/ci-linux-clang/Testing/**/*.log
            out/build/coverage/Testing/**/*.log
          if-no-files-found: warn

      - name: Upload Linux coverage output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-coverage
          path: |
            out/build/coverage/Testing/**
            out/build/coverage/coverage*.info
          if-no-files-found: warn

  linux-sanitizers:
    name: Linux Clang ASan/UBSan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y clang ninja-build

      - name: Configure
        run: cmake --preset clang-asan-ubsan

      - name: Build
        run: cmake --build --preset clang-asan-ubsan

      - name: Test
        env:
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --preset clang-asan-ubsan --output-on-failure

      - name: Upload sanitizer test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-sanitizer-test-logs
          path: out/build/clang-asan-ubsan/Testing/**/*.log
          if-no-files-found: warn

  static-analysis:
    name: Full Repository Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install static analysis tools
        run: sudo apt-get update && sudo apt-get install -y clang clang-tidy ninja-build

      - name: Run clang-tidy
        shell: pwsh
        run: ./tools/check-tidy.ps1 -Strict -Preset ci-linux-tidy -Jobs 0

      - name: Upload static analysis logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-tidy-logs
          path: |
            out/build/ci-linux-tidy/compile_commands.json
            out/build/ci-linux-tidy/.cmake/api/v1/reply/*.json
          if-no-files-found: warn

  macos:
    name: macOS Metal CMake
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: brew install ninja

      - name: Configure
        run: cmake --preset ci-macos-appleclang

      - name: Build
        run: cmake --build --preset ci-macos-appleclang

      - name: Test
        run: ctest --preset ci-macos-appleclang --output-on-failure

      - name: Upload macOS test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-test-logs
          path: out/build/ci-macos-appleclang/Testing/**/*.log
          if-no-files-found: warn
