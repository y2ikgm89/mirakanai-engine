name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Select PR validation tier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      windows: ${{ steps.classify.outputs.windows }}
      linux: ${{ steps.classify.outputs.linux }}
      linux_sanitizers: ${{ steps.classify.outputs.linux_sanitizers }}
      linux_coverage: ${{ steps.classify.outputs.linux_coverage }}
      static_analysis: ${{ steps.classify.outputs.static_analysis }}
      macos: ${{ steps.classify.outputs.macos }}
      windows_cpp23: ${{ steps.classify.outputs.windows_cpp23 }}
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify touched surfaces
        id: classify
        shell: pwsh
        run: |
          $runAll = "${{ github.event_name }}" -ne "pull_request"
          if ($runAll) {
            ./tools/classify-pr-validation-tier.ps1 -RunAll -GitHubOutputPath $env:GITHUB_OUTPUT
            return
          }

          $base = "${{ github.event.pull_request.base.sha }}"
          $head = "${{ github.event.pull_request.head.sha }}"
          $files = @(git diff --name-only $base $head)
          if ($LASTEXITCODE -ne 0) {
            Write-Error "failed to compute PR file diff"
          }

          ./tools/classify-pr-validation-tier.ps1 -ChangedPath $files -GitHubOutputPath $env:GITHUB_OUTPUT

  agent-static:
    name: Agent Static Guards
    needs: changes
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check PR diff whitespace
        if: ${{ github.event_name == 'pull_request' }}
        shell: pwsh
        run: git diff --check ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Run static validation
        shell: pwsh
        run: ./tools/validate.ps1 -StaticOnly -StaticJobs 1 -StaticCheckTimeoutSeconds 120

  windows:
    name: Windows MSVC
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    runs-on: windows-2025-vs2026
    timeout-minutes: 120
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore vcpkg tool checkout cache
        id: restore-vcpkg-tool
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ runner.os }}-vcpkg-tool-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-tool-

      - name: Clone vcpkg tool checkout
        if: ${{ steps.restore-vcpkg-tool.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg

      - name: Update vcpkg tool baseline
        shell: pwsh
        run: |
          $manifest = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $targetBaseline = $manifest.'builtin-baseline'
          if (!(Test-Path external/vcpkg/.git)) {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }
          try {
            $currentBaseline = git -C external/vcpkg rev-parse HEAD
            $resolvedTarget = git -C external/vcpkg rev-parse $targetBaseline
          } catch {
            $currentBaseline = [string]::Empty
            $resolvedTarget = [string]::Empty
          }
          if ([string]::IsNullOrWhiteSpace($resolvedTarget) -or $currentBaseline -ne $resolvedTarget) {
            git -C external/vcpkg fetch --depth 1 origin $targetBaseline
            git -C external/vcpkg checkout --force $targetBaseline
          }

      - name: Capture Windows toolchain cache identity
        id: windows-toolchain-cache
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere.exe was not found at '$vswhere'"
          }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio with MSBuild was not found"
          }
          $toolRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $clPath = Get-ChildItem -LiteralPath $toolRoot -Directory |
            Sort-Object -Property Name -Descending |
            ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\cl.exe" } |
            Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($clPath)) {
            throw "MSVC cl.exe was not found below '$toolRoot'"
          }
          $identityText = @($env:ImageOS, $env:ImageVersion, $vsPath, $clPath) -join "|"
          $identityBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($identityText))
          $identity = -join ($identityBytes | ForEach-Object { $_.ToString("x2") })
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "identity=$identity"
          Write-Information "windows-toolchain-cache-identity=$identity" -InformationAction Continue

      - name: Restore vcpkg package cache
        id: restore-vcpkg-package
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Restore vcpkg installed cache
        id: restore-vcpkg-installed
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: Restore Windows dev build cache
        id: restore-dev-build
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/dev
          key: ${{ runner.os }}-dev-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-dev-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-
            ${{ runner.os }}-dev-build-${{ steps.windows-toolchain-cache.outputs.identity }}-

      - name: Bootstrap vcpkg dependencies (Windows dev preset enables desktop GUI)
        shell: pwsh
        run: ./tools/bootstrap-deps.ps1

      - name: Validate
        shell: pwsh
        run: ./tools/validate.ps1 -SkipStaticChecks -SkipTidySmoke

      - name: Save vcpkg package cache
        if: ${{ success() && !cancelled() && steps.restore-vcpkg-package.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ steps.restore-vcpkg-package.outputs.cache-primary-key }}

      - name: Save vcpkg installed cache
        if: ${{ success() && !cancelled() && steps.restore-vcpkg-installed.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ steps.restore-vcpkg-installed.outputs.cache-primary-key }}

      - name: Save Windows dev build cache
        if: ${{ success() && !cancelled() && steps.restore-dev-build.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/dev
          key: ${{ steps.restore-dev-build.outputs.cache-primary-key }}

      - name: Upload Windows test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-test-logs
          retention-days: 14
          include-hidden-files: false
          path: |
            out/build/dev/Testing/**/*.log
          if-no-files-found: warn

  windows-cpp23:
    name: Windows C++23 Release Evaluation
    needs: changes
    if: needs.changes.outputs.windows_cpp23 == 'true'
    runs-on: windows-2025-vs2026
    timeout-minutes: 150
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore vcpkg tool checkout cache
        id: restore-vcpkg-tool
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: external/vcpkg
          key: ${{ runner.os }}-vcpkg-tool-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-tool-

      - name: Clone vcpkg tool checkout
        if: ${{ steps.restore-vcpkg-tool.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg

      - name: Update vcpkg tool baseline
        shell: pwsh
        run: |
          $manifest = Get-Content vcpkg.json -Raw | ConvertFrom-Json
          $targetBaseline = $manifest.'builtin-baseline'
          if (!(Test-Path external/vcpkg/.git)) {
            if (Test-Path external/vcpkg) {
              Remove-Item -Recurse -Force external/vcpkg
            }
            git clone --filter=blob:none --depth 1 https://github.com/microsoft/vcpkg.git external/vcpkg
          }
          try {
            $currentBaseline = git -C external/vcpkg rev-parse HEAD
            $resolvedTarget = git -C external/vcpkg rev-parse $targetBaseline
          } catch {
            $currentBaseline = [string]::Empty
            $resolvedTarget = [string]::Empty
          }
          if ([string]::IsNullOrWhiteSpace($resolvedTarget) -or $currentBaseline -ne $resolvedTarget) {
            git -C external/vcpkg fetch --depth 1 origin $targetBaseline
            git -C external/vcpkg checkout --force $targetBaseline
          }

      - name: Capture Windows toolchain cache identity
        id: windows-toolchain-cache
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path -LiteralPath $vswhere -PathType Leaf)) {
            throw "vswhere.exe was not found at '$vswhere'"
          }
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio with MSBuild was not found"
          }
          $toolRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $clPath = Get-ChildItem -LiteralPath $toolRoot -Directory |
            Sort-Object -Property Name -Descending |
            ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\cl.exe" } |
            Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($clPath)) {
            throw "MSVC cl.exe was not found below '$toolRoot'"
          }
          $identityText = @($env:ImageOS, $env:ImageVersion, $vsPath, $clPath) -join "|"
          $identityBytes = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($identityText))
          $identity = -join ($identityBytes | ForEach-Object { $_.ToString("x2") })
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "identity=$identity"
          Write-Information "windows-toolchain-cache-identity=$identity" -InformationAction Continue

      - name: Restore vcpkg package cache
        id: restore-vcpkg-package
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Restore vcpkg installed cache
        id: restore-vcpkg-installed
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'tools/bootstrap-deps.ps1') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: Restore Windows C++23 build cache
        id: restore-cpp23-build
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            out/build/cpp23-release-preset-eval
            out/build/installed-consumer-cpp23-release-eval
            out/install/cpp23-release-eval
          key: ${{ runner.os }}-cpp23-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cpp23-build-${{ steps.windows-toolchain-cache.outputs.identity }}-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}-
            ${{ runner.os }}-cpp23-build-${{ steps.windows-toolchain-cache.outputs.identity }}-

      - name: Bootstrap vcpkg dependencies (Windows dev preset enables desktop GUI)
        shell: pwsh
        run: ./tools/bootstrap-deps.ps1

      - name: C++23 Release Evaluation
        shell: pwsh
        run: ./tools/evaluate-cpp23.ps1 -Release

      - name: Save vcpkg package cache
        if: ${{ success() && !cancelled() && steps.restore-vcpkg-package.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/vcpkg
          key: ${{ steps.restore-vcpkg-package.outputs.cache-primary-key }}

      - name: Save vcpkg installed cache
        if: ${{ success() && !cancelled() && steps.restore-vcpkg-installed.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vcpkg_installed
          key: ${{ steps.restore-vcpkg-installed.outputs.cache-primary-key }}

      - name: Save Windows C++23 build cache
        if: ${{ success() && !cancelled() && steps.restore-cpp23-build.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            out/build/cpp23-release-preset-eval
            out/build/installed-consumer-cpp23-release-eval
            out/install/cpp23-release-eval
          key: ${{ steps.restore-cpp23-build.outputs.cache-primary-key }}

      - name: Upload Windows C++23 test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-cpp23-test-logs
          retention-days: 14
          include-hidden-files: false
          path: |
            out/build/cpp23-release-preset-eval/Testing/**/*.log
          if-no-files-found: warn

      - name: Upload Windows C++23 packages
        if: ${{ success() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-packages
          retention-days: 14
          compression-level: 0
          include-hidden-files: false
          path: |
            out/build/cpp23-release-preset-eval/*.zip
            out/build/cpp23-release-preset-eval/*.zip.sha256
          if-no-files-found: error

  linux:
    name: Linux CMake
    needs: changes
    if: needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 2G
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore Linux ccache
        id: restore-linux-ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-clang-${{ hashFiles('CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-clang-

      - name: Restore Linux CMake build cache
        id: restore-linux-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/ci-linux-clang
          key: ${{ runner.os }}-linux-ci-linux-clang-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-linux-ci-linux-clang-

      - name: Verify preinstalled toolchain and install ccache
        run: |
          command -v clang >/dev/null 2>&1 || { echo "clang is required on ubuntu-latest runner images"; exit 1; }
          command -v g++ >/dev/null 2>&1 || { echo "g++ is required on ubuntu-latest runner images"; exit 1; }
          command -v ninja >/dev/null 2>&1 || { echo "ninja is required on ubuntu-latest runner images"; exit 1; }
          if ! command -v ccache >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends --no-install-suggests ccache
          fi

      - name: Prepare ccache
        run: |
          ccache --zero-stats

      - name: Configure
        run: cmake --preset ci-linux-clang

      - name: Build
        run: cmake --build --preset ci-linux-clang --parallel "$(nproc)"

      - name: Test
        run: ctest --preset ci-linux-clang --output-on-failure --parallel "$(nproc)"

      - name: Show ccache stats
        if: ${{ always() && !cancelled() }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache is not installed; skipping stats after an earlier checkout or toolchain setup failure"
          fi

      - name: Upload Linux test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-test-logs
          retention-days: 14
          include-hidden-files: false
          path: |
            out/build/ci-linux-clang/Testing/**/*.log
          if-no-files-found: warn

  linux-coverage:
    name: Linux Coverage
    needs: changes
    if: needs.changes.outputs.linux_coverage == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 2G
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore Linux coverage ccache
        id: restore-linux-coverage-ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-coverage-${{ hashFiles('CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-coverage-

      - name: Restore Linux coverage build cache
        id: restore-linux-coverage-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/coverage
          key: ${{ runner.os }}-linux-coverage-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-linux-coverage-

      - name: Verify preinstalled toolchain and install coverage extras
        run: |
          command -v clang >/dev/null 2>&1 || { echo "clang is required on ubuntu-latest runner images"; exit 1; }
          command -v ninja >/dev/null 2>&1 || { echo "ninja is required on ubuntu-latest runner images"; exit 1; }
          missing_packages=()
          command -v ccache >/dev/null 2>&1 || missing_packages+=("ccache")
          command -v lcov >/dev/null 2>&1 || missing_packages+=("lcov")
          if [ "${#missing_packages[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends --no-install-suggests "${missing_packages[@]}"
          fi

      - name: Prepare ccache
        run: |
          ccache --zero-stats

      - name: Coverage
        shell: pwsh
        run: ./tools/check-coverage.ps1 -Strict

      - name: Show ccache stats
        if: ${{ always() && !cancelled() }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache is not installed; skipping stats after an earlier checkout or toolchain setup failure"
          fi

      - name: Upload Linux coverage logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-coverage
          retention-days: 14
          include-hidden-files: false
          path: |
            out/build/coverage/Testing/**
            out/build/coverage/coverage*.info
          if-no-files-found: warn

  linux-sanitizers:
    name: Linux Clang ASan/UBSan
    needs: changes
    if: needs.changes.outputs.linux_sanitizers == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 2G
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore Linux sanitizer ccache
        id: restore-linux-sanitizer-ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-asan-${{ hashFiles('CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-asan-

      - name: Restore Linux sanitizer build cache
        id: restore-linux-sanitizer-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/clang-asan-ubsan
          key: ${{ runner.os }}-linux-asan-ubsan-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-linux-asan-ubsan-

      - name: Verify preinstalled toolchain and install ccache
        run: |
          command -v clang >/dev/null 2>&1 || { echo "clang is required on ubuntu-latest runner images"; exit 1; }
          command -v ninja >/dev/null 2>&1 || { echo "ninja is required on ubuntu-latest runner images"; exit 1; }
          if ! command -v ccache >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends --no-install-suggests ccache
          fi

      - name: Prepare ccache
        run: |
          ccache --zero-stats

      - name: Configure
        run: cmake --preset clang-asan-ubsan

      - name: Build
        run: cmake --build --preset clang-asan-ubsan --parallel "$(nproc)"

      - name: Test
        env:
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --preset clang-asan-ubsan --output-on-failure --parallel "$(nproc)"

      - name: Show ccache stats
        if: ${{ always() && !cancelled() }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache is not installed; skipping stats after an earlier checkout or toolchain setup failure"
          fi

      - name: Upload sanitizer test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-sanitizer-test-logs
          retention-days: 14
          include-hidden-files: false
          path: out/build/clang-asan-ubsan/Testing/**/*.log
          if-no-files-found: warn

  static-analysis:
    name: Full Repository Static Analysis
    needs: changes
    if: needs.changes.outputs.static_analysis == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_index: 0
          - shard_index: 1
          - shard_index: 2
          - shard_index: 3
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 2G
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore Linux tidy ccache
        id: restore-linux-tidy-ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-linux-tidy-${{ hashFiles('CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-linux-tidy-

      - name: Restore Linux tidy build cache
        id: restore-linux-tidy-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/ci-linux-tidy
          key: ${{ runner.os }}-linux-tidy-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-linux-tidy-

      - name: Verify preinstalled toolchain and install ccache
        run: |
          command -v clang >/dev/null 2>&1 || { echo "clang is required on ubuntu-latest runner images"; exit 1; }
          command -v clang-tidy >/dev/null 2>&1 || { echo "clang-tidy is required on ubuntu-latest runner images"; exit 1; }
          command -v ninja >/dev/null 2>&1 || { echo "ninja is required on ubuntu-latest runner images"; exit 1; }
          if ! command -v ccache >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends --no-install-suggests ccache
          fi

      - name: Prepare ccache
        run: |
          ccache --zero-stats

      - name: Run clang-tidy
        shell: pwsh
        run: ./tools/check-tidy.ps1 -Strict -Preset ci-linux-tidy -ShardCount 4 -ShardIndex ${{ matrix.shard_index }} -Jobs 0

      - name: Show ccache stats
        if: ${{ always() && !cancelled() }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache is not installed; skipping stats after an earlier checkout or toolchain setup failure"
          fi

      - name: Upload static analysis logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-analysis-tidy-logs-${{ matrix.shard_index }}
          retention-days: 14
          include-hidden-files: false
          path: |
            out/build/ci-linux-tidy/compile_commands.json
            out/build/ci-linux-tidy/.cmake/api/v1/reply/*.json
          if-no-files-found: warn

  macos:
    name: macOS Metal CMake
    needs: changes
    if: needs.changes.outputs.macos == 'true'
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: true
      CCACHE_COMPRESSLEVEL: 6
      CCACHE_MAXSIZE: 2G
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CMAKE_C_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Retry checkout after transient fetch/auth failure
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore macOS ccache
        id: restore-macos-ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache-${{ hashFiles('CMakePresets.json', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-macos-ccache-

      - name: Restore macOS build cache
        id: restore-macos-build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: out/build/ci-macos-appleclang
          key: ${{ runner.os }}-macos-clang-${{ hashFiles('CMakePresets.json', 'vcpkg.json', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-macos-clang-

      - name: Ensure build tools are available
        shell: bash
        run: |
          command -v ninja >/dev/null 2>&1 || { echo "ninja is required on macos-latest runner images"; exit 1; }
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi
          ninja --version
          ccache --version

      - name: Prepare ccache
        run: |
          ccache --zero-stats

      - name: Configure
        run: cmake --preset ci-macos-appleclang

      - name: Build
        run: cmake --build --preset ci-macos-appleclang --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Test
        run: ctest --preset ci-macos-appleclang --output-on-failure --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Show ccache stats
        if: ${{ always() && !cancelled() }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache is not installed; skipping stats after an earlier checkout or toolchain setup failure"
          fi

      - name: Upload macOS test logs
        if: ${{ failure() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-test-logs
          retention-days: 14
          include-hidden-files: false
          path: out/build/ci-macos-appleclang/Testing/**/*.log
          if-no-files-found: warn

  pr-gate:
    name: PR Gate
    needs:
      - changes
      - agent-static
      - windows
      - linux
      - windows-cpp23
      - linux-coverage
      - linux-sanitizers
      - static-analysis
      - macos
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify selected validation tier
        shell: pwsh
        run: |
          $needs = '${{ toJson(needs) }}' | ConvertFrom-Json
          $failed = @()
          foreach ($job in $needs.PSObject.Properties) {
            if ($job.Value.result -in @("failure", "cancelled")) {
              $failed += "$($job.Name)=$($job.Value.result)"
            }
          }
          if ($failed.Count -gt 0) {
            Write-Error "PR validation gate failed: $($failed -join ', ')"
          }
          "PR validation gate passed"
