name: iOS Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-validate.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "engine/**"
      - "games/**"
      - "platform/ios/**"
      - "tools/build-mobile-apple.ps1"
      - "tools/check-mobile-packaging.ps1"
      - "tools/common.ps1"
      - "tools/smoke-ios-package.ps1"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/ios-validate.yml"
      - "CMakeLists.txt"
      - "cmake/**"
      - "engine/**"
      - "games/**"
      - "platform/ios/**"
      - "tools/build-mobile-apple.ps1"
      - "tools/check-mobile-packaging.ps1"
      - "tools/common.ps1"
      - "tools/smoke-ios-package.ps1"

jobs:
  simulator-smoke:
    name: iOS Simulator smoke
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcode-select -p
          xcrun --sdk iphonesimulator --show-sdk-path
          xcrun simctl list runtimes

      - name: Mobile packaging diagnostics
        shell: pwsh
        run: ./tools/check-mobile-packaging.ps1 -RequireApple

      - name: Build and launch sample_headless on iOS Simulator
        shell: pwsh
        run: ./tools/smoke-ios-package.ps1 -Game sample_headless -Configuration Debug -BootTimeoutSeconds 420 -BootAttempts 2

      - name: Upload iOS build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: |
            out/build/ios-Simulator-sample_headless-Debug/**/*.app
            out/build/ios-Simulator-sample_headless-Debug/**/*.log
          if-no-files-found: warn
